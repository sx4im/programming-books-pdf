name: Markdown lint

on:
  push:
    branches: [main]
    paths: ["**/*.md", ".markdownlint.json", ".github/workflows/markdown-lint.yml"]
  pull_request:
    paths: ["**/*.md", ".markdownlint.json", ".github/workflows/markdown-lint.yml"]

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !REPORT.md
