---
name: Book suggestion
description: Suggest a book by title only — do not submit links; maintainers attach Drive files
title: "[Book] "
labels: ["enhancement", "book-suggestion"]
body:
  - type: markdown
    attributes:
      value: |
        **Suggest the book title only.** Do not paste Drive, example.com, or any other links.
        Maintainers find the book and attach a valid public Google Drive PDF link.
  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - Python
        - JavaScript
        - Java
        - C#
        - C
        - C++
        - TypeScript
        - Go
        - Rust
        - PHP
        - Kotlin
        - SQL
        - Swift
        - Dart
        - Shell (Bash)
        - R
        - HTML/CSS
        - Lua
        - MATLAB
        - Assembly
        - Haskell
        - PowerShell
        - Zig
        - Solidity
        - Perl
        - Fortran
        - Objective-C
        - Clojure
        - Groovy
        - VBA
        - Other / cross-cutting
    validations:
      required: true
  - type: dropdown
    id: level
    attributes:
      label: Skill level section
      options:
        - For Beginners
        - For Intermediate Developers
        - For Advanced Programmers
        - For Specialized Fields
        - Comprehensive References
    validations:
      required: true
  - type: input
    id: title
    attributes:
      label: Book title
      placeholder: Fluent Python
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Author (if known)
      placeholder: Luciano Ramalho
    validations:
      required: false
  - type: input
    id: edition
    attributes:
      label: Edition or note (optional)
      placeholder: 2nd Edition
  - type: textarea
    id: why
    attributes:
      label: Why should this be included?
      description: One or two sentences on audience or the gap it fills. Do not include URLs.
    validations:
      required: true
  - type: checkboxes
    id: no-links
    attributes:
      label: Confirmation
      options:
        - label: I am suggesting a title only — I did not include any download or Drive links.
          required: true
