---
name: Book suggestion
description: Suggest a book by title — a link is optional; maintainers attach Drive files
title: "[Book] "
labels: ["enhancement", "book-suggestion"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a title to add. **You do not need a link** — maintainers will find the book and attach the public Drive share when appropriate.
  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - Python
        - JavaScript
        - Java
        - C#
        - C
        - C++
        - TypeScript
        - Go
        - Rust
        - PHP
        - Kotlin
        - SQL
        - Swift
        - Ruby
        - Dart
        - Scala
        - Elixir
        - Shell (Bash)
        - R
        - Julia
        - Other / cross-cutting
    validations:
      required: true
  - type: dropdown
    id: level
    attributes:
      label: Skill level section
      options:
        - For Beginners
        - For Intermediate Developers
        - For Advanced Programmers
        - For Specialized Fields
        - Comprehensive References
    validations:
      required: true
  - type: input
    id: title
    attributes:
      label: Book title
      placeholder: Fluent Python
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Author (if known)
      placeholder: Luciano Ramalho
    validations:
      required: false
  - type: input
    id: edition
    attributes:
      label: Edition or note (optional)
      placeholder: 2nd Edition
  - type: input
    id: url
    attributes:
      label: Link (optional)
      description: Not required. Add only if you already have a public Drive or official docs URL.
      placeholder: https://
    validations:
      required: false
  - type: textarea
    id: why
    attributes:
      label: Why should this be included?
      description: One or two sentences on audience or the gap it fills.
    validations:
      required: true
