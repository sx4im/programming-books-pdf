<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800" role="img" aria-label="Reference">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>
  <rect x="36" y="36" width="528" height="728" rx="28" fill="url(#panel)" stroke="#94a3b8" stroke-opacity="0.35"/>

  <!-- accent bar -->
  <rect x="72" y="88" width="120" height="8" rx="4" fill="url(#accent)"/>

  <!-- book / docs mark -->
  <g transform="translate(180 250)">
    <rect x="0" y="20" width="160" height="210" rx="14" fill="#e2e8f0"/>
    <rect x="40" y="0" width="160" height="210" rx="14" fill="#f8fafc"/>
    <rect x="40" y="0" width="18" height="210" fill="#cbd5e1"/>
    <rect x="78" y="48" width="100" height="10" rx="5" fill="#94a3b8"/>
    <rect x="78" y="78" width="84" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="78" y="108" width="92" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="78" y="138" width="70" height="10" rx="5" fill="#cbd5e1"/>
    <circle cx="200" cy="188" r="28" fill="url(#accent)"/>
    <path d="M190 188h20M200 178v20" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="300" y="560" text-anchor="middle" fill="#f8fafc" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700" letter-spacing="4">REFERENCE</text>
  <text x="300" y="610" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" letter-spacing="3">DOCS &amp; OFFICIAL GUIDES</text>
  <text x="300" y="700" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" letter-spacing="2">ULTIMATE PROGRAMMING BOOKS</text>
</svg>
